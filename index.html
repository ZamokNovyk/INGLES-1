    <!-- SPA Chunk Loader / Asset Recovery Script (Resolves MIME/deployment cache errors) -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          var url = e.target.src || e.target.href;
          if (url && (url.indexOf('/assets/') > -1 || url.indexOf('.js') > -1 || url.indexOf('.css') > -1)) {
            console.warn('Fallo al cargar recurso estático. Intentando recargar página para limpiar caché...', url);
            var lastReload = localStorage.getItem('last_asset_reload');
            var now = Date.now();
            if (!lastReload || now - parseInt(lastReload, 10) > 10000) {
              localStorage.setItem('last_asset_reload', now.toString());
              window.location.reload();
            }
          }
        }
      }, true);
    </script>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
